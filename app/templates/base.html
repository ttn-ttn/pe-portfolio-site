<!DOCTYPE html>
<html lang="en">

  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Personal Portfolio">
    <meta property="og:description" content="My Personal Portfolio">
    <meta property="og:url" content="{{ request.url }}">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet">

    <link lang='sass' rel="stylesheet" href="./static/styles/main.css">
    <link rel='icon' href='./static/img/favicon.ico' type='image/x-icon' />
    {% block head %} {% endblock %}
    <title>{{ personal.name }}</title>
  </head>

  <body>
    <header class="nav-bar">
      <div class="nav-content">
        <a href="/">
          <div class="nav-logo">
            <img src="./static/img/logo.svg" />
          </div>
        </a>
	<nav>
	  {% for link in nav %}
	  <a href="{{ link.url }}"
	    {% if request.path == link.url %}class="active"{% endif %}>
	    {{ link.name }}
	  </a>
	  {% endfor %}
	  <a href="/timeline"
	    {% if request.path == '/timeline' %}class="active"{% endif %}>
	    Timeline
	  </a>
	</nav>
      </div>
    </header>

    {% block content %}
    {% endblock %}

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-name">&copy; {{ personal.name }}</div>
        {% if personal.socials %}
        <nav class="footer-socials" aria-label="Social links">
          {% for s in personal.socials %}
          <a href="{{ s.url }}" target="_blank" rel="me noopener noreferrer">{{ s.name }}</a>
          {% endfor %}
        </nav>
        {% endif %}
      </div>
    </footer>

  </body>
</html>
