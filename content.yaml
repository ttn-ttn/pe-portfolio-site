# Personal data
personal:
  name: "Tomás Ortín"
  picture: "tomas.jpg"
  bio: >-   # Plain text bio, HTML tags are allowed
    My name is Tomás Ortín Fernández (quanrong). I'm from Spain, living in a little
    mountain village in the North. I have contributed patches to the
    <a href="https://gcc.gnu.org">GNU Compiler Collection</a> extending its static
    analyzer, accepted for GCC 17. I attended the
    <a href="https://www.recurse.com">Recurse Center</a> in 2025. I also maintain
    packages for <a href="https://guix.gnu.org">GNU Guix</a> and enjoy building
    things from scratch. Currently participating in the
    <a href="https://fellowship.mlh.com/programs/production-engineering-sre">MLH x Meta Production Engineering Fellowship</a>.
  interests:
    - "Programming Languages"
    - "Systems Programming"
    - "Compilers"
    - "Free Software"
    - "Hiking"
    - "Reading"
    - "Basic Chemistry"

  socials:
    - name: "Codeberg"
      url: "https://codeberg.org/quanrong"
    - name: "GitHub"
      url: "https://github.com/ttn-ttn"
    - name: "Email"
      url: "mailto:quanrong@mailbox.org"

experience:
  - title: "Participant"
    organization: "Recurse Center"
    period: "2025 – 2026"
    description: >
      Self-directed educational retreat for programmers. Pair programmed on
      programming language implementation and systems programming projects.
  - title: "Prep Fellow"
    organization: "Major League Hacking Prep Program"
    period: "2023"
    description: >
      Collaborated with international fellows to build a weather web app.
      Implemented a Go proxy service to securely handle third-party API calls
      from the backend.

education:
  - title: "BSc in Computer Science, First Class Honours"
    organization: "University of London (UoL)"
    period: "2022 – 2025"
  - title: "BA in Asian Cultural Studies (China)"
    organization: "Universidad Autónoma de Madrid (UAM)"
    period: "2016 – 2022"
  - title: "Professional Certificates: Data Science, AI Engineering (IBM); IT Support (Google)"
    organization: ~
    period: "2022 – 2024"

projects:
  - title: "GNU Compiler Collection (GCC)"
    description: >
      Extended the static analyzer (<code>-fanalyzer</code>) with handlers for the
      mktemp family. Added argument validation, three new warning flags, and
      success/failure path bifurcation enabling fd leak and double-close detection.
      Three patches accepted for GCC 17.
    period: "2026 –"
    url: ~
  - title: "Dolus: Scheme to x86_64 compiler"
    description: >
      Building a compiler from Scheme to native x86_64 assembly in OCaml with
      register allocation. Under development.
    period: "2025 –"
    url: "https://codeberg.org/quanrong/dolus"
  - title: "Data Collection Project"
    description: >
      Survey platform with a real-time LLM conversational agent for L2 English
      research, in collaboration with Universitat de Barcelona. Rails application
      with speaking tasks, FastAPI service using OLMo2, Whisper, and piper-tts.
    period: "2024 – 2025"
    url: "https://codeberg.org/quanrong/videogames_survey"
  - title: "Anthill: Real-time top-down shooter"
    description: >
      Top-down shooter in Go with infinite procedural world generation. Collision
      detection and pathfinding implemented from scratch.
    period: "2025"
    url: "https://codeberg.org/quanrong/anthill"
  - title: "PolyML Standard ML Compiler - Bug fixes"
    description: >
      Fixed bugs in <code>IEEEReal.scan</code> and <code>Word.toInt</code> related
      to incorrect overflow handling, bringing behavior into compliance with the
      Standard ML specification.
    period: "2024"
    url: ~
  - title: "GNU Guix Package Manager"
    description: >
      Contributed several packages to GNU Guix, a functional package manager for
      GNU/Linux systems.
    period: "2021 –"
    url: ~

hobbies:
  - title: "Reading"
    picture: "hobby-reading.jpg"
    description: >-
      Mostly nonfiction: philosophy (particularly the perennial tradition: Huxley,
      Watts), spirituality and religion, history, and science (e.g psychopharmacology).
      I also read old science fiction, classical fiction, and technical programming books.
  - title: "Hiking"
    picture: "hobby-hiking.jpg"
    description: >-
      I go out every day and do a full day-long hike once a week in the Cantabrian
      mountains. I enjoy camping and sleeping in open shepherd's huts. I hike both
      solo and with my girlfriend, and almost always with my 14-year-old dog.
  - title: "Programming"
    picture: "hobby-programming.jpg"
    description: >-
      Outside of projects, I enjoy writing toy interpreters and learning programming
      languages with different paradigms: Lisp, OCaml, Elixir. Lisp in particular
      changed how I think. Discovering homoiconicity and the idea that code is data
      is something I keep finding relevant even in languages that do not support it.
  - title: "Kitchen Chemistry"
    picture: "hobby-chemistry.jpg"
    description: >-
      I enjoy simple practical chemistry experiments at home. Simple processes like
      alkaloid extractions, nothing elaborate.

